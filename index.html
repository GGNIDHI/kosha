<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA / Mobile meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kosha" />

    <!-- SEO -->
    <title>Kosha — Personal Finance Tracker</title>
    <meta name="description" content="Your AI-powered personal finance dashboard. Track expenses, investments, budgets, goals, and taxes — all private and local." />

    <!-- Splash screen bg (matches app dark theme) -->
    <style>
      html, body { margin: 0; padding: 0; background: #07090f; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #07090f;
        gap: 20px;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; }
      #splash img {
        width: 110px; height: 110px;
        border-radius: 28px;
        box-shadow: 0 0 60px rgba(139,92,246,0.4), 0 0 120px rgba(139,92,246,0.15);
        animation: splashPulse 1.8s ease-in-out infinite;
      }
      #splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em;
        background: linear-gradient(135deg, #e2d9f3 0%, #8b5cf6 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      #splash-sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 0.82rem; color: rgba(255,255,255,0.35); letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      #splash-bar-wrap {
        width: 120px; height: 3px;
        background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden;
        margin-top: 8px;
      }
      #splash-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #8b5cf6, #c4b5fd);
        border-radius: 99px;
        animation: splashLoad 1.6s cubic-bezier(.4,0,.2,1) forwards;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1);   box-shadow: 0 0 60px rgba(139,92,246,0.4), 0 0 120px rgba(139,92,246,0.15); }
        50%       { transform: scale(1.04); box-shadow: 0 0 80px rgba(139,92,246,0.6), 0 0 160px rgba(139,92,246,0.25); }
      }
      @keyframes splashLoad {
        0%   { width: 0%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen (dismissed by main.tsx) -->
    <div id="splash">
      <img src="/logo.png" alt="Kosha logo" />
      <div id="splash-title">Kosha</div>
      <div id="splash-sub">Personal Finance Tracker</div>
      <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
